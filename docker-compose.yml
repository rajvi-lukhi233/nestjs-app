version: '3.8'
services:
  app:
    container_name: nestjs-app
    build: .
    ports:
      - '3000:3000'
    volumes:
      - .:/app
  mongo:
    image: mongo
    ports:
    - '27017:27017'
    volumes:
    - mongo-data:/data/db

  redis:
    image: redis
    ports:
    - '6379:6379'
    volumes:
    - redis-data:/data

volumes:
  mongo-data:
  redis-data:
